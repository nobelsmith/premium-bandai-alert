name: Premium Bandai Monitor

on:
  schedule:
    # Every 5 minutes (GitHub Actions minimum reliable interval)
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Primary key is unique per run (cache entries are immutable).
      # restore-keys loads the most recent prior snapshot.
      - name: Restore / save catalog state
        uses: actions/cache@v5
        with:
          path: state.json
          key: pbandai-state-v1-${{ github.run_id }}
          restore-keys: |
            pbandai-state-v1-

      - name: Verify Discord webhook secret
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "::error::Repository secret DISCORD_WEBHOOK_URL is not set."
            echo "Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Run monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          STATE_PATH: state.json
        run: python monitor.py
