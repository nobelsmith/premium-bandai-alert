name: Premium Bandai Monitor

# Optional manual runs only. Prefer the Vultr systemd timer for reliable polling.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Restore / save catalog state
        uses: actions/cache@v5
        with:
          path: state.json
          key: pbandai-state-v1-${{ github.run_id }}
          restore-keys: |
            pbandai-state-v1-

      - name: Verify Discord webhook secret
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "::error::Repository secret DISCORD_WEBHOOK_URL is not set."
            echo "Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Run monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          STATE_PATH: state.json
        run: uv run python monitor.py
